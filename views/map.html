<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKATOR | Live Map Telemetry</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05050a;
            --bg-card: rgba(10, 10, 20, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f3f9;
            --text-secondary: #858fa3;
            --accent-primary: #7c4dff;
            --accent-secondary: #00e5ff;
            --accent-gradient: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Space Grotesk', sans-serif;
            --success: #00e676;
            --warning: #ffd600;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Floating HUD Panel */
        .hud-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .hud-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .hud-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hud-logo svg {
            color: var(--accent-primary);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--success);
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.15);
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-pill.updating {
            color: var(--warning);
            background: rgba(255, 214, 0, 0.08);
            border-color: rgba(255, 214, 0, 0.15);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-pill.updating .status-dot {
            background-color: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        /* Telemetry Fields */
        .telemetry-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .telemetry-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 10px;
        }

        .tel-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .tel-value {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tel-coord-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Action Buttons */
        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        .back-btn {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.2);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 77, 255, 0.35);
            filter: brightness(1.1);
        }

        /* Custom Leaflet Map styling overrides */
        .leaflet-bar {
            border: 1px solid var(--border-color) !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important;
            border-radius: 10px !important;
            overflow: hidden;
        }

        .leaflet-bar a {
            background-color: var(--bg-card) !important;
            color: #fff !important;
            border-bottom: 1px solid var(--border-color) !important;
            transition: background 0.3s;
        }

        .leaflet-bar a:hover {
            background-color: rgba(255, 255, 255, 0.05) !important;
        }

        .leaflet-container {
            background-color: var(--bg-color) !important;
        }

        /* Dark popup theme */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            backdrop-filter: blur(10px) !important;
            color: #fff !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 24px rgba(0,0,0,0.4) !important;
        }

        .leaflet-popup-tip {
            background: rgba(10, 10, 20, 0.85) !important;
            border: 1px solid var(--border-color) !important;
        }

        .popup-title {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent-secondary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .popup-id {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .hud-panel {
                top: auto;
                bottom: 24px;
                left: 12px;
                right: 12px;
                width: calc(100% - 24px);
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Floating HUD Overlay -->
    <div class="hud-panel">
        <div class="hud-header">
            <div class="hud-logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>Telemetry Map</span>
            </div>
            <div class="status-pill" id="status-display">
                <span class="status-dot"></span>
                <span id="status-text">Connected</span>
            </div>
        </div>

        <div class="telemetry-group">
            <div class="telemetry-row">
                <span class="tel-label">Device Target ID</span>
                <span class="tel-value" id="display-id">Loading...</span>
            </div>

            <div class="telemetry-row">
                <span class="tel-label">Tracking Mode</span>
                <span class="tel-value" id="tel-method" style="color: var(--accent-secondary); font-weight: 600;">GPS (High Accuracy)</span>
            </div>

            <div class="telemetry-row">
                <span class="tel-label">Resolved Address</span>
                <span class="tel-value" id="tel-address" style="white-space: normal; line-height: 1.4; font-size: 13px;">Resolving address...</span>
            </div>

            <div class="tel-coord-grid">
                <div class="telemetry-row">
                    <span class="tel-label">Latitude</span>
                    <span class="tel-value" id="tel-lat">0.0000</span>
                </div>
                <div class="telemetry-row">
                    <span class="tel-label">Longitude</span>
                    <span class="tel-value" id="tel-lng">0.0000</span>
                </div>
            </div>
        </div>

        <div class="actions-group">
            <a href="#" id="gmaps-link" target="_blank" class="back-btn" style="background: linear-gradient(135deg, #34a853 0%, #4285f4 100%); margin-bottom: 4px; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.25);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>Open in Google Maps</span>
            </a>
            <a href="/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                <span>Console Dashboard</span>
            </a>
        </div>
    </div>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/socket.io@4.8.1/client-dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const displayId = document.querySelector("#display-id");
        const statusDisplay = document.querySelector("#status-display");
        const statusText = document.querySelector("#status-text");
        const telLat = document.querySelector("#tel-lat");
        const telLng = document.querySelector("#tel-lng");
        const telAddress = document.querySelector("#tel-address");
        const telMethod = document.querySelector("#tel-method");
        const gmapsLink = document.querySelector("#gmaps-link");

        const id = new URLSearchParams(location.search).get("id");
        displayId.innerHTML = id;

        // Load starting coordinates templated by tarkine
        let latLng = [25.1743, 75.9193]; // Default fallback (Kota, India)
        let startingMethod = "GPS (High Accuracy)";
        try {
            const rawData = `{{ data }}`;
            if (rawData && rawData.trim() !== "") {
                const parsed = JSON.parse(rawData);
                if (Array.isArray(parsed) && parsed.length >= 2) {
                    latLng = [Number(parsed[0]), Number(parsed[1])];
                    if (parsed[2]) {
                        startingMethod = parsed[2];
                    }
                }
            }
        } catch (e) {
            console.warn("Invalid telemetry data, using default fallback.", e);
        }
        const startLat = latLng[0];
        const startLng = latLng[1];
        
        telLat.innerHTML = startLat.toFixed(5);
        telLng.innerHTML = startLng.toFixed(5);
        telMethod.innerHTML = startingMethod;

        // Set GMaps href and resolve address
        gmapsLink.href = `https://www.google.com/maps/search/?api=1&query=${startLat},${startLng}`;
        resolveAddress(startLat, startLng);

        // Initialize Leaflet Map
        const map = L.map('map', {
            zoomControl: true
        }).setView(latLng, 14);

        // Set zoom controls positioning to bottom-right
        map.zoomControl.setPosition('bottomright');

        // Add Google Hybrid (Satellite + Road Labels) Tile Layer
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            attribution: 'Map data &copy; Google'
        }).addTo(map);

        // Create Custom Dark Icon
        const pulseIcon = L.divIcon({
            className: 'custom-pulse-marker',
            html: `
                <div style="
                    position: relative;
                    width: 24px;
                    height: 24px;
                    background: rgba(0, 229, 255, 0.2);
                    border: 2px solid #00e5ff;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                ">
                    <div style="
                        width: 10px;
                        height: 10px;
                        background: #00e5ff;
                        border-radius: 50%;
                        box-shadow: 0 0 10px #00e5ff;
                    "></div>
                </div>
            `,
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // Add Marker
        const marker = L.marker(latLng, { icon: pulseIcon }).addTo(map);
        
        // Bind Custom styled Popup with Google Maps shortcut
        marker.bindPopup(`
            <div class="popup-title">TELEMETRY PROBE</div>
            <div class="popup-id" style="margin-bottom: 8px;">${id}</div>
            <a href="https://www.google.com/maps/search/?api=1&query=${startLat},${startLng}" target="_blank" style="
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: #4285f4;
                color: #fff;
                text-decoration: none;
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 11px;
                font-weight: 600;
                box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
            ">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>Google Maps View</span>
            </a>
        `).openPopup();

        // Connect Sockets
        const socket = io("", {
            secure: true,
            path: "/socket.io",
            transports: ['websocket']
        });

        function resolveAddress(lat, lng) {
            telAddress.innerHTML = "Resolving address...";
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, {
                headers: {
                    'User-Agent': 'LokatorTelemetryTracker/1.0'
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.display_name) {
                    // Try to find the most specific place name (like shop, building, amenity, etc.)
                    let specificPlace = "";
                    const addr = data.address || {};
                    const keys = ['amenity', 'shop', 'building', 'office', 'tourism', 'house_name', 'house_number', 'road', 'neighbourhood'];
                    for (const key of keys) {
                        if (addr[key]) {
                            specificPlace = addr[key];
                            break;
                        }
                    }
                    
                    if (specificPlace && specificPlace !== addr.road && specificPlace !== addr.house_number) {
                        telAddress.innerHTML = `<strong>${specificPlace}</strong><br>${data.display_name}`;
                    } else {
                        telAddress.innerHTML = data.display_name;
                    }
                } else {
                    telAddress.innerHTML = "Address details not registered";
                }
            })
            .catch(err => {
                console.error("Address lookup failed:", err);
                telAddress.innerHTML = "Address lookup offline";
            });
        }

        // Telemetry Update Listeners
        socket.on("map-data", data => {
            if (data.id == id) {
                // Update Status Visuals
                statusDisplay.classList.add("updating");
                statusText.innerHTML = "Updating";
                
                // Update Coordinates UI
                const latNum = Number(data.lat);
                const lngNum = Number(data.lng);
                telLat.innerHTML = latNum.toFixed(5);
                telLng.innerHTML = lngNum.toFixed(5);
                telMethod.innerHTML = data.method || "GPS (High Accuracy)";

                // Update GMaps link and lookup address
                gmapsLink.href = `https://www.google.com/maps/search/?api=1&query=${latNum},${lngNum}`;
                resolveAddress(latNum, lngNum);

                // Update Map Viewport & Marker
                marker.setLatLng([latNum, lngNum]);
                marker.setPopupContent(`
                    <div class="popup-title">TELEMETRY PROBE</div>
                    <div class="popup-id" style="margin-bottom: 8px;">${id}</div>
                    <a href="https://www.google.com/maps/search/?api=1&query=${latNum},${lngNum}" target="_blank" style="
                        display: inline-flex;
                        align-items: center;
                        gap: 6px;
                        background: #4285f4;
                        color: #fff;
                        text-decoration: none;
                        padding: 6px 12px;
                        border-radius: 6px;
                        font-size: 11px;
                        font-weight: 600;
                        box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
                    ">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span>Google Maps View</span>
                    </a>
                `);
                map.setView([latNum, lngNum], map.getZoom());

                // Reset status display indicator after 2s
                setTimeout(() => {
                    statusDisplay.classList.remove("updating");
                    statusText.innerHTML = "Connected";
                }, 2000);
            }
        });
    </script>
</body>

</html>
